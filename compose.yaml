services:
  wm31bot:
    build: .
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    env_file:
      - .env.production
    volumes:
      - wm31bot-state:/app/state

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    depends_on:
      - wm31bot
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  wm31bot-state:
  caddy-data:
  caddy-config:
