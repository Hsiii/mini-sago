services:
  wm31bot:
    build: .
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    env_file:
      - .env.production
    environment:
      GAMER_FORUM_STATE_FILE: /app/state/gamer-forum-state.json
    volumes:
      - wm31bot-state:/app/state
    networks:
      - shared

networks:
  shared:
    external: true
    name: bots_shared

volumes:
  wm31bot-state:
