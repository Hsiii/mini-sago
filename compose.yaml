services:
  wm31bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - wm31bot
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
