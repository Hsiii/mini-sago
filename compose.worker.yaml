services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    init: true
    env_file: .env.worker
    environment:
      MINISAGO_WORKER_ID: oracle
      MINISAGO_WORKER_CAPABILITIES: chat,dev
    volumes:
      - minisago-codex:/home/bun/.codex
      - minisago-github:/home/bun/.config/gh
      - minisago-state:/var/lib/minisago
      - minisago-workspace:/workspace

volumes:
  minisago-codex:
  minisago-github:
  minisago-state:
  minisago-workspace:
